<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 시안 A: Newsreader + 인디고/라벤더 --><!-- 변주3: 라벤더글로우 --><!-- 옵션1: 왼쪽 들여쓰기 --><title>개인정보처리방침 — OLNR Labs</title>
<meta name="description" content="오엘엔알랩스는 오랜 마케팅 현장 경험을 기술과 결합해, 마케터의 일하는 방식과 마케팅의 성과를 끌어올립니다.">
<!-- OG 태그 (링크 공유 시 미리보기) -->
<meta property="og:title" content="OLNR Labs — 마케팅을, 기술로 다시 씁니다">
<meta property="og:description" content="마케팅 현장 경험을 기술과 결합해 마케터의 일과 성과를 끌어올립니다.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://olnrlabs.io">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141a3a;
    --ink-soft:#1e2650;
    --paper:#f6f3ec;
    --paper-dim:#c7cdd6;
    --amber:#a99bf5;
    --amber-deep:#7c6fd4;
    --line:rgba(246,243,236,.14);
    --maxw:1080px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  /* 앵커 이동 시 고정 헤더에 안 가리도록 */
  section{scroll-margin-top:80px}
  body{
    background:var(--ink);color:var(--paper);
    font-family:'Inter','Noto Serif KR',serif;
    font-weight:400;line-height:1.7;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    word-break:keep-all;overflow-wrap:break-word;
  }
  body.lang-ko{font-family:'Noto Serif KR','Newsreader',serif}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  /* 본문 섹션 콘텐츠 안쪽 들여쓰기 (여백의 미) */
  .vision .wrap, .team .wrap, .product .wrap{padding-left:clamp(28px,7vw,110px)}

  /* ---------- 헤더 & 메뉴 ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;
    background:rgba(15,27,45,0);
    transition:background .4s ease, border-color .4s ease;
    border-bottom:1px solid transparent;
  }
  header.scrolled{
    background:rgba(15,27,45,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:'Arial Black','Arial',sans-serif;font-weight:900;font-size:19px;
    letter-spacing:-.3px;color:var(--paper);text-decoration:none;
  }
  .brand span{color:var(--paper)}
  .nav-right{display:flex;align-items:center;gap:26px}
  .nav-menu{display:flex;gap:26px;font-family:'Inter',sans-serif}
  body.lang-ko .nav-menu{font-family:'Noto Serif KR',serif}
  .nav-menu a{
    color:var(--paper-dim);text-decoration:none;font-size:14px;font-weight:500;
    letter-spacing:.2px;transition:color .2s;position:relative;padding:4px 0;
  }
  .nav-menu a:hover{color:var(--paper)}
  .nav-menu a.active{color:var(--amber)}
  .nav-menu a.active::after{
    content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;
    background:var(--amber);border-radius:2px;
  }
  .lang-toggle{
    display:flex;gap:2px;border:1px solid var(--line);border-radius:999px;
    padding:3px;font-size:12.5px;font-family:'Inter',sans-serif;
  }
  .lang-toggle button{
    background:none;border:none;color:var(--paper-dim);
    padding:5px 11px;border-radius:999px;cursor:pointer;
    font-weight:500;letter-spacing:.5px;transition:all .2s;
  }
  .lang-toggle button.active{background:var(--amber);color:var(--ink)}

  /* 모바일 메뉴 토글 */
  .menu-btn{
    display:none;background:none;border:1px solid var(--line);
    color:var(--paper);border-radius:8px;padding:6px 9px;cursor:pointer;
    font-size:16px;line-height:1;
  }

  /* ---------- 언어 전환 ---------- */
  .ko-only{display:none}
  body.lang-ko .ko-only{display:block}
  body.lang-ko .en-only{display:none}
  span.ko-only,span.en-only{display:inline}
  body.lang-ko span.en-only{display:none}
  body:not(.lang-ko) span.ko-only{display:none}
  .lang-toggle button:focus-visible,a:focus-visible{outline:2px solid var(--amber);outline-offset:3px}

  /* ---------- 히어로 ---------- */
  .hero{
    min-height:100vh;display:flex;flex-direction:column;justify-content:center;
    position:relative;padding:120px 0 80px;
  }
  .hero::before{
    content:"";position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 15%, rgba(169,155,245,.16), transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 90%, rgba(169,155,245,.08), transparent 60%);
    pointer-events:none;
  }
  .hero .wrap{position:relative;z-index:1}
  .eyebrow{
    font-family:'Inter',sans-serif;font-size:13px;letter-spacing:2.5px;
    text-transform:uppercase;color:var(--amber);font-weight:600;
    margin-bottom:26px;display:flex;align-items:center;gap:12px;
  }
  body.lang-ko .eyebrow{font-family:'Noto Serif KR',serif;letter-spacing:1px}
  .eyebrow::before{content:"";width:32px;height:1px;background:var(--amber)}
  h1{
    font-family:'Newsreader',serif;font-weight:500;
    font-size:clamp(2.6rem,6.5vw,5rem);line-height:1.06;
    letter-spacing:-.5px;margin-bottom:30px;max-width:14ch;
  }
  body.lang-ko h1{font-family:'Noto Serif KR',serif;font-weight:700;letter-spacing:-1px;line-height:1.15}
  .hero p.lede{font-size:clamp(1.05rem,2vw,1.3rem);color:var(--paper-dim);max-width:44ch}
  .scroll-cue{
    position:absolute;bottom:34px;left:50%;transform:translateX(-50%);
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--paper-dim);opacity:.6;z-index:1;font-family:'Inter',sans-serif;
  }

  /* ---------- 공통 섹션 ---------- */
  section{padding:110px 0;position:relative}
  .sec-label{
    font-family:'Inter',sans-serif;font-size:13px;letter-spacing:1.5px;
    color:var(--amber);font-weight:600;margin-bottom:20px;text-transform:uppercase;
  }
  body.lang-ko .sec-label{font-family:'Noto Serif KR',serif;letter-spacing:.5px;text-transform:none}
  h2{
    font-family:'Newsreader',serif;font-weight:500;
    font-size:clamp(1.9rem,4vw,3rem);line-height:1.15;
    letter-spacing:-.4px;margin-bottom:28px;max-width:22ch;
  }
  body.lang-ko h2{font-family:'Noto Serif KR',serif;font-weight:700;letter-spacing:-.8px}
  .body-lg{font-size:clamp(1.02rem,1.6vw,1.18rem);color:var(--paper-dim);max-width:64ch;line-height:1.85}
  .body-lg + .body-lg{margin-top:24px}

  /* Vision — 밝은 반전 */
  .vision{background:radial-gradient(ellipse 70% 90% at 50% 0%, rgba(169,155,245,.10), transparent 65%), var(--ink)}
  .vision .sec-label{color:var(--amber)}
  .vision .body-lg{color:var(--paper-dim)}
  .vision h2{max-width:24ch}

  /* Team */
  .team{background:radial-gradient(ellipse 70% 90% at 50% 100%, rgba(169,155,245,.07), transparent 65%), var(--ink)}
  .team .body-lg{max-width:58ch;color:var(--paper)}
  .team .body-lg strong{color:var(--amber);font-weight:600}

  /* Project — 박스 없이 텍스트로 (심플) */
  .product .card{
    position:relative;
  }
  .product .tag{
    display:inline-block;font-family:'Inter',sans-serif;font-size:12px;
    letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);
    margin-bottom:16px;font-weight:600;
  }
  body.lang-ko .product .tag{font-family:'Noto Serif KR',serif;letter-spacing:.5px;text-transform:none}
  .product h3{font-family:'Newsreader',serif;font-weight:600;font-size:clamp(1.7rem,3.2vw,2.4rem);margin-bottom:18px;letter-spacing:-.3px}
  body.lang-ko .product h3{font-family:'Noto Serif KR',serif;font-weight:700}
  .product .card p{color:var(--paper-dim);max-width:56ch;font-size:1.08rem}
  .learn-more{
    display:inline-flex;align-items:center;gap:8px;margin-top:24px;
    color:var(--amber);text-decoration:none;font-weight:600;font-size:.98rem;
    font-family:'Inter',sans-serif;
  }
  body.lang-ko .learn-more{font-family:'Noto Serif KR',serif}
  .learn-more .soon{color:var(--paper-dim);font-weight:400;font-size:.82rem;border:1px solid var(--line);border-radius:999px;padding:2px 10px}
  .learn-more .arrow{transition:transform .2s}
  .learn-more:hover .arrow{transform:translateX(4px)}

  /* 01/02/03 — 체리팜의 부연설명. 간격 좁혀 붙이고 글씨 축소 */
  .diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:44px}
  .diff-item{padding:0}
  .diff-item .d-num{font-family:'Newsreader',serif;font-size:1rem;color:var(--amber);font-weight:600;margin-bottom:10px;opacity:.85}
  .diff-item h4{font-size:.98rem;font-weight:600;margin-bottom:8px;font-family:'Noto Serif KR','Newsreader',serif}
  .diff-item p{color:var(--paper-dim);font-size:.88rem;max-width:34ch;line-height:1.7}

  /* Footer */
  footer{border-top:1px solid var(--line);padding:64px 0 48px}
  .foot-grid{display:flex;justify-content:space-between;flex-wrap:wrap;gap:32px;align-items:flex-start}
  .foot-brand{font-family:'Arial Black','Arial',sans-serif;font-size:1.4rem;font-weight:900;line-height:1.1;letter-spacing:-.3px}
  .foot-brand span{color:var(--paper)}
  .foot-sub{color:var(--paper-dim);font-size:.9rem;margin-top:3px}
  .foot-label{color:var(--paper-dim);font-size:.9rem;margin-bottom:3px}
  .foot-info{color:var(--paper-dim);font-size:.82rem;line-height:1.7;margin-top:0}
  .foot-contact a{color:var(--paper);text-decoration:none;border-bottom:1px solid var(--amber);padding-bottom:2px}
  .foot-bottom{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;align-items:center;margin-top:40px}
  .foot-legal{color:var(--paper-dim);font-size:.82rem;font-family:'Inter',sans-serif}
  .foot-links{display:flex;gap:18px;font-family:'Inter',sans-serif}
  .foot-links a{color:var(--paper-dim);font-size:.82rem;text-decoration:none;transition:color .2s}
  .foot-links a:hover{color:var(--amber)}

  .reveal{opacity:0;transform:translateY(24px);transition:opacity .8s ease, transform .8s ease}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;transition:none}
    html{scroll-behavior:auto}
  }

  @media(max-width:820px){
    .nav-menu{
      display:none;position:absolute;top:100%;right:28px;
      flex-direction:column;gap:0;background:rgba(15,27,45,.97);
      backdrop-filter:blur(10px);border:1px solid var(--line);
      border-radius:12px;padding:8px;min-width:160px;
    }
    .nav-menu.open{display:flex}
    .nav-menu a{padding:10px 14px}
    .nav-menu a.active::after{display:none}
    .menu-btn{display:block}
  }
  @media(max-width:760px){
    section{padding:80px 0}
    .diff-grid{grid-template-columns:1fr;gap:28px}
    .diff-item{padding:0}
    .hero{padding:110px 0 70px}
    .foot-grid,.foot-bottom{flex-direction:column;align-items:flex-start}
  }

  /* 서브페이지 제목 — 한글/영문 모두 세리프 */
  .legal-title{font-family:'Newsreader',serif;font-weight:500;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.4px;margin-bottom:32px;line-height:1.2}
  body.lang-ko .legal-title{font-family:'Noto Serif KR',serif;font-weight:700;letter-spacing:-.8px}
  </style>
</head>
<body class="lang-ko">

<header id="site-header" class="scrolled">
  <a href="index.html" class="brand">OLNR<span>.</span>Labs</a>
  <div class="nav-right">
    <a href="index.html" style="color:var(--paper-dim);text-decoration:none;font-size:14px;font-family:'Inter',sans-serif"><span class="ko-only">← 홈으로</span><span class="en-only">← Home</span></a>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button id="btn-ko" class="active" onclick="setLang('ko')">KO</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main id="top" style="max-width:820px;margin:0 auto;padding:140px 28px 100px">
  <div class="sec-label" style="color:var(--amber)">v0.1 · Draft</div>
  <h1 class="legal-title">
    <span class="ko-only">개인정보처리방침</span><span class="en-only">Privacy Policy</span>
  </h1>
  <p class="body-lg" style="color:var(--paper-dim)">
    <span class="ko-only">본 문서는 현재 준비 중입니다.</span>
    <span class="en-only">This document is currently being prepared.</span>
  </p>
</main>

<footer id="contact">
  <div class="wrap">
    <div class="foot-bottom" style="border:none">
      <div class="foot-legal">© 2026 OLNR Labs. All rights reserved.</div>
      <div class="foot-links">
        <a href="privacy.html"><span class="ko-only">개인정보처리방침</span><span class="en-only">Privacy</span></a>
        <a href="terms.html"><span class="ko-only">이용약관</span><span class="en-only">Terms</span></a>
      </div>
    </div>
  </div>
</footer>

<script>
  function setLang(lang){
    document.body.classList.toggle('lang-ko', lang==='ko');
    document.body.classList.toggle('lang-en', lang==='en');
    document.documentElement.lang = lang;
    document.getElementById('btn-ko').classList.toggle('active', lang==='ko');
    document.getElementById('btn-en').classList.toggle('active', lang==='en');
  }
</script>
</body>
</html>
